###########################################################################################
# Это YML файл. Будьте осторожны при редактировании. Проверяйте свои правки               #
# в YAML валидаторе, например, на http://yaml-online-parser.appspot.com                   #
###########################################################################################

protection:
  flags:
    MAGIC_BLOCK:
      name: Магический блок
      description: Предотвращает ломание магического блока
      hint: <red>Ломание магического блока запрещено!</red>
    START_SAFETY:
      name: Защита новичков от падений
      description: Запрещает новичкам двигаться в течение 1 минуты.
      hint: <red>Движение заблокировано в целях безопасности ещё на [number] секунд!</red>
      free-to-move: <green>Теперь вы можете двигаться. Будьте осторожны!</green>
    ONEBLOCK_BOSSBAR:
        name: Boss Bar
        description: |-
          &b Показывает панель состояния
          &b для каждой фазы.
    ONEBLOCK_ACTIONBAR:
      name: Action Bar
      description: |-
        &b Показывает статус
        &b для каждой фазы
        &b в Action Bar.
aoneblock:
  bossbar:
    title: Осталось блоков
    # статус: "<green>Статус фазы <aqua>[total]</aqua>. Осталось: <aqua>[todo]</aqua></green>"
    # статус: "<green>[phase-name] : [percent-done]</green>"
    status: '<green>Статус фазы <aqua>[done] <light_purple>/</light_purple> [total]</aqua></green>'
    # RED, WHITE, PINK, BLUE, GREEN, YELLOW, or PURPLE
    color: RED
    # SOLID, SEGMENTED_6, SEGMENTED_10, SEGMENTED_12, SEGMENTED_20
    style: SOLID
    not-active: <red>Боссбар отключен на этом острове.</red>
  actionbar:
    status: '<green>Фаза: <aqua>[phase-name]</aqua> <light_purple>|</light_purple> Блоков: <aqua>[done] <light_purple>/</light_purple> [total]</aqua> <light_purple>|</light_purple> Прогресс: <aqua>[percent-done]</aqua></green>'
    not-active: <red>Панель действий отключена на этом острове.</red>
  commands:
    admin:
      setcount:
        parameters: <имя> <количество> [lifetime]
        description: установить количество блоков у игрока
        set: <green>Счётчик [name] установлен на [number]</green>
        set-lifetime: <green>Общий счётчик [name] установлен на [number]</green>
      setchest:
        parameters: <фаза> <редкость>
        description: поместить сундук, на который смотрите, в фазу с указанной редкостью
        chest-is-empty: <red>Этот сундук пуст, поэтому его нельзя добавить.</red>
        unknown-phase: <red>Неизвестная фаза. Используйте Tab для подсказки.</red>
        unknown-rarity: <red>Неизвестная редкость. Используйте COMMON, UNCOMMON, RARE или EPIC</red>
        look-at-chest: <red>Посмотрите на заполненный сундук, чтобы установить его.</red>
        only-single-chest: <red>Можно устанавливать только одиночные сундуки.</red>
        success: <green>Сундук успешно добавлен в фазу!</green>
        failure: <red>Не удалось добавить сундук в фазу! Проверьте консоль на наличие ошибок.</red>
      sanity:
        parameters: <фаза>
        description: вывести в консоль проверку вероятностей фазы
        see-console: <green>Смотрите отчёт в консоли.</green>
    count:
      description: показать количество вскопано блоков и фазу
      info: <green>Вскопано <aqua>[number]</aqua> блоков на фазе [name]</green>
    info:
      count: <green>Вскопано <aqua>[number]</aqua> блоков на фазе <aqua>[name]</aqua>. Всего сломано <aqua>[lifetime]</aqua>.</green>
    phases:
      description: показать список всех фаз
      title: <dark_green>Фазы OneBlock</dark_green>
      name-syntax: <green>[name]</green>
      description-syntax: <aqua>[number] блоков</aqua>
    island:
      bossbar:
        description: вкл/выкл боссбар фазы
        status_on: <green><aqua>Боссбар</aqua> включён</green>
        status_off: <red><aqua>Боссбар</aqua> отключен</red>
      actionbar:
        description: вкл/выкл панель действий фазы
        status_on: <green><aqua>Панель действий</aqua> включена</green>
        status_off: <red><aqua>Панель действий</aqua> отключена</red>
      setcount:
        parameters: <количество>
        description: установить счётчик блоков на ранее завершённое значение
        set: <green>Счётчик установлен на [number].</green>
        too-high: '<red>Максимальное значение, которое вы можете установить: [number]!</red>'
    respawn-block:
      description: восстановить магический блок в случаях, когда он исчезает
      block-exist: <green>Блок существует, восстановление не требовалось.</green>
      block-respawned: <green>Блок восстановлен.</green>
  phase:
    insufficient-level: <red>Уровень вашего острова слишком низок для продолжения! Требуется [number].</red>
    insufficient-funds: <red>Ваши средства слишком малы для продолжения! Требуется [number].</red>
    insufficient-bank-balance: <red>Баланс банка острова слишком низок для продолжения! Требуется [number].</red>
    insufficient-permission: <red>Вы не можете продолжать, пока не получите разрешение [name]!</red>
    cooldown: <red>Следующая фаза станет доступна через [number] секунд!</red>
  placeholders:
    infinite: Бесконечность
  gui:
    titles:
      phases: <black><bold>Фазы OneBlock</bold></black>
    buttons:
      previous:
        name: <white><bold>Предыдущая страница</bold></white>
        description: <gray>Перейти на страницу [number]</gray>
      next:
        name: <white><bold>Следующая страница</bold></white>
        description: <gray>Перейти на страницу [number]</gray>
      phase:
        name: <white><bold>[phase]</bold></white>
        description: |-
          [starting-block]
          [biome]
          [bank]
          [economy]
          [level]
          [permission]
          [blocks]
        starting-block: <gray>Начинается после разрушения <yellow>[number]</yellow> блоков.</gray>
        biome: '<gray>Биом: <yellow>[biome]</yellow></gray>'
        bank: '<gray>Требуется <yellow>$[number]</yellow> на счету банка.</gray>'
        economy: '<gray>Требуется <yellow>$[number]</yellow> на счёте игрока.</gray>'
        level: '<gray>Требуется <yellow>[number]</yellow> уровень острова.</gray>'
        permission: '<gray>Требуется разрешение <yellow>[permission]</yellow>.</gray>'
        blocks-prefix: '<gray>Блоки в фазе - </gray>'
        blocks: '<yellow>[name], </yellow>'
        wrap-at: '50'
    tips:
      click-to-previous: '<gray><yellow>Нажмите</yellow> для перехода на предыдущую страницу.</gray>'
      click-to-next: '<gray><yellow>Нажмите</yellow> для перехода на следующую страницу.</gray>'
      click-to-change: '<gray><yellow>Нажмите</yellow> для изменения.</gray>'
  island:
    starting-hologram: |-
      <green>Добро пожаловать в AOneBlock</green>
      <yellow>Разрушьте блок, чтобы начать</yellow>
